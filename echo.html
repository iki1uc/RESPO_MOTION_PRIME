<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Echo</title>
</head>
<body>

<h1>Echo</h1>

<p>Aktiver Bereich:</p>

<h2 id="active"></h2>

<script>
  const p = new URLSearchParams(window.location.search);
  const active = p.get("active") || "Keiner";
  document.getElementById("active").innerText = active;
</script>

<!-- Fehler an ERROR senden -->
<a id="err"></a>
<script>
  document.getElementById("err").href =
    "error.html?from=Echo&active=" + active + "&hint=Echo+Fehler";
  document.getElementById("err").innerText = "Fehler senden";
</script>

<br><br>
<a href="index.html">Zurück zu ROOT</a>

</body>
</html>
